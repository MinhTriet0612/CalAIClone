groups:
  - name: calai-alerts
    rules:
      # High error rate
      - alert: HighErrorRate
        expr: |
          sum(rate(http_request_errors_total[5m])) /
          sum(rate(http_requests_total[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: 'High error rate detected (> 5%)'
          description: 'Error rate is {{ $value | humanizePercentage }} over the last 5 minutes'

      # High response time
      - alert: HighResponseTime
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High p95 response time (> 2s)'
          description: 'p95 latency is {{ $value }}s'

      # Service down
      - alert: ServiceDown
        expr: up{job="calai-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'CalAI backend is down'
          description: 'The CalAI backend service has been unreachable for 1 minute'

      # High memory usage
      - alert: HighMemoryUsage
        expr: |
          process_resident_memory_bytes{job="calai-backend"} > 512 * 1024 * 1024
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High memory usage (> 512MB)'
          description: 'Backend memory usage is {{ $value | humanize1024 }}B'

      # AI analysis failures
      - alert: AIAnalysisFailureRate
        expr: |
          rate(meal_analysis_total{is_food="error"}[10m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Elevated AI analysis failure rate'
          description: 'Meal analysis errors are elevated'
