version: '3.8'

services:
  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: calai-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped

  # Grafana - Dashboards and alerting
  grafana:
    image: grafana/grafana:10.4.1
    container_name: calai-grafana
    ports:
      - '3002:3000'
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  # GlitchTip - Error tracking (Sentry-compatible)
  glitchtip:
    image: glitchtip/glitchtip
    container_name: calai-glitchtip
    ports:
      - '8000:8000'
    environment:
      - DATABASE_URL=postgres://postgres:postgres@glitchtip-db:5432/glitchtip
      - SECRET_KEY=change-me-to-a-random-secret-key
      - PORT=8000
      - GLITCHTIP_DOMAIN=http://localhost:8000
      - DEFAULT_FROM_EMAIL=info@localhost
      - EMAIL_URL=consolemail://
    depends_on:
      - glitchtip-db
    restart: unless-stopped

  glitchtip-db:
    image: postgres:16-alpine
    container_name: calai-glitchtip-db
    environment:
      - POSTGRES_DB=glitchtip
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - glitchtip-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  glitchtip-worker:
    image: glitchtip/glitchtip
    container_name: calai-glitchtip-worker
    command: ./bin/run-celery-with-beat.sh
    environment:
      - DATABASE_URL=postgres://postgres:postgres@glitchtip-db:5432/glitchtip
      - SECRET_KEY=change-me-to-a-random-secret-key
      - GLITCHTIP_DOMAIN=http://localhost:8000
    depends_on:
      - glitchtip-db
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
  glitchtip-db-data:
